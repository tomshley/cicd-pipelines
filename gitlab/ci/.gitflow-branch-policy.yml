#region Per-flow-type rule fragments (consumers extend these to inherit branch gating)

.policy-runs-on-feature:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^feature\/.+$/'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'

.policy-runs-on-develop:
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

.policy-runs-on-release:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^release\/.+$/'
    - if: '$CI_COMMIT_BRANCH =~ /^release\/.+$/'

.policy-runs-on-hotfix:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\/.+$/'
    - if: '$CI_COMMIT_BRANCH =~ /^hotfix\/.+$/'

.policy-runs-on-tag:
  rules:
    - if: '$CI_COMMIT_TAG'

.policy-runs-on-main:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'

.policy-runs-on-any-branch:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH'

.policy-runs-always:
  rules:
    - when: always

#endregion
