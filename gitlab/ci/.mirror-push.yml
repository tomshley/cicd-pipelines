# ---------------------------------------------------------------------------
# Git mirror push.
# Consumers include this file to mirror branches and tags to a secondary
# remote (e.g., Bitbucket, GitHub).
#
# Required CI/CD variables (set in .secure_files/.env or CI/CD settings):
#   TOMSHLEY_CICD_MIRROR_URL — Remote URL (SSH or HTTPS)
#
# Optional:
#   TOMSHLEY_CICD_MIRROR_BRANCHES  — Comma-separated branch list (default: main)
#   TOMSHLEY_CICD_MIRROR_BRANCH_MAP — Comma-separated src:dst pairs for branch renaming
#                                    e.g. "main:main,develop:contrib"
#                                    Overrides BRANCHES when set.
#   TOMSHLEY_CICD_MIRROR_TAGS      — Mirror tags: true/false (default: true)
#   TOMSHLEY_CICD_MIRROR_SSH_KEY   — Path to SSH key in .secure_files/
#   TOMSHLEY_CICD_MIRROR_FORCE_PUSH — Use --force instead of --force-with-lease (default: true)
#
# If TOMSHLEY_CICD_MIRROR_URL is empty, the job is a safe no-op.
#
# Force Push Behavior:
#   By default, this job uses --force to ensure the mirror matches origin exactly.
#   This is safe because the origin CI pipeline is authoritative and the mirror
#   is a downstream read-only copy. Set TOMSHLEY_CICD_MIRROR_FORCE_PUSH=false to
#   use --force-with-lease instead (safer but may fail if mirror has diverged).
#   NEVER commit directly to the mirror — it will be overwritten.
#
# Failure Handling:
#   This job has allow_failure: true to prevent mirror sync issues from blocking
#   the main pipeline. Check job logs if mirroring fails due to auth/network issues.
#
# Credentials: The .secure_files/.env file is sourced automatically.
# For SSH mirrors, set TOMSHLEY_CICD_MIRROR_SSH_KEY to the key path
# inside .secure_files/ and ensure the key is uploaded via GitLab
# Secure Files. HTTPS mirrors can use embedded tokens in the URL.
# ---------------------------------------------------------------------------


#region Mirror Push Configuration
.tomshley-cicd-mirror-config:
  image: ${BASE_CONTAINERS_REGISTRY}/base-alpine-3_23-upstream:${BASE_CONTAINERS_UPSTREAM_TAG}
  tags:
    - saas-linux-small-amd64
  variables:
    BASE_CONTAINERS_REGISTRY: registry.gitlab.com/tomshley/brands/global/tware/tech/products/provisioning/base-containers
    BASE_CONTAINERS_UPSTREAM_TAG: "0.4.2"
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
    TOMSHLEY_CICD_MIRROR_URL: ""
    TOMSHLEY_CICD_MIRROR_BRANCHES: "main"
    TOMSHLEY_CICD_MIRROR_BRANCH_MAP: ""
    TOMSHLEY_CICD_MIRROR_TAGS: "true"
    TOMSHLEY_CICD_MIRROR_SSH_KEY: ""
    TOMSHLEY_CICD_MIRROR_FORCE_PUSH: "true"
  before_script:
    - apk add --no-cache git curl bash openssh-client
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash || true
    - |
      set -e
      # Source secure-files .env if present (same pattern as gitflow-jobs)
      if [ -f ".secure_files/.env" ]; then
        set -a
        . .secure_files/.env
        set +a
      fi
      # Neutralize LFS so hooks/filters don't block mirror operations
      git config --global filter.lfs.smudge "cat"
      git config --global filter.lfs.clean "cat"
      git config --global filter.lfs.required false
      rm -f .git/hooks/post-checkout .git/hooks/pre-push .git/hooks/post-commit .git/hooks/post-merge 2>/dev/null || true
      git checkout -- . 2>/dev/null || true
      # Configure SSH key if provided (only for SSH URLs)
      if [ -n "${TOMSHLEY_CICD_MIRROR_SSH_KEY:-}" ]; then
        if [ ! -f "${TOMSHLEY_CICD_MIRROR_SSH_KEY}" ]; then
          echo "⚠️  WARNING: TOMSHLEY_CICD_MIRROR_SSH_KEY is set to '${TOMSHLEY_CICD_MIRROR_SSH_KEY}' but file not found"
          echo "    Did you upload it via GitLab Secure Files?"
        elif echo "${TOMSHLEY_CICD_MIRROR_URL}" | grep -qE '^(git@|ssh://)'; then
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          cp "${TOMSHLEY_CICD_MIRROR_SSH_KEY}" ~/.ssh/mirror_key
          chmod 600 ~/.ssh/mirror_key
          # Extract host from SSH URL (supports IPv6 bracket notation)
          MIRROR_HOST=$(echo "${TOMSHLEY_CICD_MIRROR_URL}" | sed -E '
            s|^git@\[([^]]+)\]:.*|\1|;
            s|^git@([^:]+):.*|\1|;
            s|^ssh://([^@]+@)?\[([^]]+)\].*|\2|;
            s|^ssh://([^@]+@)?([^/:]+).*|\2|
          ')
          if [ -n "${MIRROR_HOST}" ] && ! echo "${MIRROR_HOST}" | grep -q '/'; then
            ssh-keyscan -H "${MIRROR_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/mirror_key -o StrictHostKeyChecking=accept-new"
          else
            echo "⚠️  WARNING: Could not extract host from MIRROR_URL for SSH setup"
          fi
        else
          echo "⚠️  WARNING: TOMSHLEY_CICD_MIRROR_SSH_KEY is set but MIRROR_URL is not SSH — key will be ignored"
        fi
      fi
      # Add mirror remote (safe no-op if URL is empty — job script checks first)
      if [ -n "${TOMSHLEY_CICD_MIRROR_URL:-}" ]; then
        git remote add mirror "${TOMSHLEY_CICD_MIRROR_URL}" 2>/dev/null || git remote set-url mirror "${TOMSHLEY_CICD_MIRROR_URL}"
        # Fetch from mirror to update refs and avoid "stale info" errors
        git fetch mirror --prune --prune-tags 2>/dev/null || true
      fi
#endregion


#region Mirror Sync (branch/tag pipelines)
tomshley-cicd-mirror-sync:
  stage: .post
  extends:
    - .tomshley-cicd-mirror-config
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      when: on_success
  allow_failure: true
  script:
    - |
      set -e

      if [ -z "${TOMSHLEY_CICD_MIRROR_URL:-}" ]; then
        echo "TOMSHLEY_CICD_MIRROR_URL is not set — skipping mirror sync"
        exit 0
      fi

      echo "=== Mirror Sync ==="
      # Sanitize URL for logging (strip embedded credentials if present)
      SAFE_MIRROR_URL=$(echo "${TOMSHLEY_CICD_MIRROR_URL}" | sed -E 's|://[^@]+@|://***@|')
      echo "Mirror URL:   ${SAFE_MIRROR_URL}"
      if [ -n "${TOMSHLEY_CICD_MIRROR_BRANCH_MAP:-}" ]; then
        echo "Branch map:   ${TOMSHLEY_CICD_MIRROR_BRANCH_MAP}"
      else
        echo "Branches:     ${TOMSHLEY_CICD_MIRROR_BRANCHES}"
      fi
      echo "Mirror tags:  ${TOMSHLEY_CICD_MIRROR_TAGS}"
      echo "Force push:   ${TOMSHLEY_CICD_MIRROR_FORCE_PUSH}"

      # Determine push flags
      # --force: overwrite mirror unconditionally (GitLab is source of truth)
      # (empty): regular fast-forward push (safe default)
      if [ "${TOMSHLEY_CICD_MIRROR_FORCE_PUSH}" = "true" ]; then
        PUSH_FLAGS="--force"
      else
        PUSH_FLAGS=""
      fi

      # Fetch latest refs from origin
      # --prune-tags only on branch pipelines; on tag pipelines the current
      # tag may not yet exist on the remote and would be deleted locally.
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        git fetch --prune origin
      else
        git fetch --prune --prune-tags origin
      fi

      PUSHED=0

      # Push matching branches
      if [ -n "${CI_COMMIT_BRANCH:-}" ]; then
        if [ -n "${TOMSHLEY_CICD_MIRROR_BRANCH_MAP:-}" ]; then
          # Branch map mode: parse src:dst pairs
          OLD_IFS="$IFS"
          IFS=','
          for mapping in ${TOMSHLEY_CICD_MIRROR_BRANCH_MAP}; do
            mapping=$(echo "$mapping" | tr -d '[:space:]')
            src=$(echo "$mapping" | cut -d: -f1)
            dst=$(echo "$mapping" | cut -d: -f2)
            if [ -z "$dst" ]; then
              dst="$src"
            fi
            if [ "$src" = "${CI_COMMIT_BRANCH}" ]; then
              echo "Pushing branch: ${src} → ${dst} (${PUSH_FLAGS})"
              # Ensure remote tracking ref exists before pushing
              git fetch origin "${src}:${src}" 2>/dev/null || true
              git push mirror "refs/remotes/origin/${src}:refs/heads/${dst}" ${PUSH_FLAGS} 2>&1 || {
                echo "ERROR: Failed to push branch ${src} → ${dst} to mirror"
                exit 1
              }
              PUSHED=$((PUSHED + 1))
            fi
          done
          IFS="$OLD_IFS"
          if [ "$PUSHED" -eq 0 ]; then
            echo "Branch '${CI_COMMIT_BRANCH}' is not in TOMSHLEY_CICD_MIRROR_BRANCH_MAP — skipping"
          fi
        else
          # Simple branch list mode (backward compatible)
          OLD_IFS="$IFS"
          IFS=','
          for branch in ${TOMSHLEY_CICD_MIRROR_BRANCHES}; do
            branch=$(echo "$branch" | tr -d '[:space:]')
            if [ "$branch" = "${CI_COMMIT_BRANCH}" ]; then
              echo "Pushing branch: ${branch} (${PUSH_FLAGS})"
              # Ensure remote tracking ref exists before pushing
              git fetch origin "${branch}:${branch}" 2>/dev/null || true
              git push mirror "refs/remotes/origin/${branch}:refs/heads/${branch}" ${PUSH_FLAGS} 2>&1 || {
                echo "ERROR: Failed to push branch ${branch} to mirror"
                exit 1
              }
              PUSHED=$((PUSHED + 1))
            fi
          done
          IFS="$OLD_IFS"
          if [ "$PUSHED" -eq 0 ]; then
            echo "Branch '${CI_COMMIT_BRANCH}' is not in TOMSHLEY_CICD_MIRROR_BRANCHES — skipping"
          fi
        fi
      fi

      # Push tags
      if [ "${TOMSHLEY_CICD_MIRROR_TAGS}" = "true" ]; then
        if [ -n "${CI_COMMIT_TAG:-}" ]; then
          # Tag pipeline: push only this tag
          echo "Pushing tag: ${CI_COMMIT_TAG} (${PUSH_FLAGS})"
          git push mirror "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}" ${PUSH_FLAGS} 2>&1 || {
            echo "ERROR: Failed to push tag ${CI_COMMIT_TAG} to mirror"
            exit 1
          }
          PUSHED=$((PUSHED + 1))
        elif [ -n "${CI_COMMIT_BRANCH:-}" ]; then
          # Branch pipeline: push all tags
          echo "Pushing all tags (${PUSH_FLAGS})"
          git push mirror --tags ${PUSH_FLAGS} 2>&1 || {
            echo "ERROR: Failed to push tags to mirror"
            exit 1
          }
          # Just increment by 1 to indicate tags were synced
          PUSHED=$((PUSHED + 1))
        fi
      fi

      if [ "$PUSHED" -gt 0 ]; then
        echo "✓ Mirrored ${PUSHED} ref(s) to ${SAFE_MIRROR_URL}"
      else
        echo "No refs matched mirror criteria — nothing pushed"
      fi
#endregion
