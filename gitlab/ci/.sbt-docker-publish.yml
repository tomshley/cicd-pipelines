.tomshley-sbt-docker-publish:
  extends:
    - .tomshley-sbt-runtime
    - .before-container-tags

  services:
    - name: ${BASE_CONTAINERS_REGISTRY}/daemon-docker-29-dind-rootless-vendored:${BASE_CONTAINERS_UPSTREAM_TAG}
      alias: docker

  variables:
    BASE_CONTAINERS_REGISTRY: registry.gitlab.com/tomshley/brands/global/tware/tech/products/provisioning/base-containers
    BASE_CONTAINERS_UPSTREAM_TAG: "0.4.2"
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    SBT_DOCKER_PUBLISH_IMAGE: ""

  before_script:
    - !reference [.tomshley-sbt-runtime, before_script]
    - !reference [.before-container-tags, before_script]
    - |
      if [ -n "$CI_REGISTRY_USER" ] && [ -n "$CI_REGISTRY_PASSWORD" ]; then
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
      fi

  script:
    - |
      set -e
      sbt Docker/publish
      if [ -n "$SBT_DOCKER_PUBLISH_IMAGE" ]; then
        # Derive VERSION_TAG to match TomshleyCIBuildVersionPlugin: base-revision
        # @see CIBuildVersionPluginKeys.scala
        BASE_VERSION=$(sed 's/^v//' "${CI_PROJECT_DIR}/VERSION" | tr -d '[:space:]')
        if [ -n "$TOMSHLEY_CICD_BUILD_REVISION" ]; then
          VERSION_TAG="${BASE_VERSION}-${TOMSHLEY_CICD_BUILD_REVISION}"
        else
          VERSION_TAG="${BASE_VERSION}"
        fi
        echo "Tagging ${SBT_DOCKER_PUBLISH_IMAGE}:"
        echo "  version  = ${VERSION_TAG}"
        echo "  branch   = ${BASE_CONTAINERS_TAG}"
        echo "  latest   = ${BASE_CONTAINERS_TAG_LATEST}"
        docker images "${SBT_DOCKER_PUBLISH_IMAGE}" --format '  local    = {{.Tag}}'
        docker image inspect "${SBT_DOCKER_PUBLISH_IMAGE}:${VERSION_TAG}" >/dev/null 2>&1 \
          || { echo "ERROR: expected local image tag ${VERSION_TAG} not found"; docker images "${SBT_DOCKER_PUBLISH_IMAGE}"; exit 1; }
        docker tag "${SBT_DOCKER_PUBLISH_IMAGE}:${VERSION_TAG}" "${SBT_DOCKER_PUBLISH_IMAGE}:${BASE_CONTAINERS_TAG}"
        docker tag "${SBT_DOCKER_PUBLISH_IMAGE}:${VERSION_TAG}" "${SBT_DOCKER_PUBLISH_IMAGE}:${BASE_CONTAINERS_TAG_LATEST}"
        docker push "${SBT_DOCKER_PUBLISH_IMAGE}:${BASE_CONTAINERS_TAG}"
        docker push "${SBT_DOCKER_PUBLISH_IMAGE}:${BASE_CONTAINERS_TAG_LATEST}"
      else
        echo "INFO: SBT_DOCKER_PUBLISH_IMAGE not set — skipping branch-scoped tagging"
      fi
