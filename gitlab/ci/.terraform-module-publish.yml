.tomshley-terraform-module-publish:
  extends:
    - .flow-artifact-publish
    - .tomshley-terraform-runtime
  script:
    - |
      MODULE_VERSION="${TOMSHLEY_CICD_BUILD_VERSION:-$(cat ${CI_PROJECT_DIR}/VERSION 2>/dev/null || echo 'dev')}"
      MODULE_VERSION="${MODULE_VERSION#v}"
      MODULE_NAME="${TF_MODULE_NAME:-${CI_PROJECT_NAME}}"
      MODULE_SYSTEM="${TF_MODULE_SYSTEM:-local}"
      cd "${TF_ROOT:-${CI_PROJECT_DIR}}"
      tar czf /tmp/module.tgz .
      curl --fail-with-body \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file /tmp/module.tgz \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/${MODULE_NAME}/${MODULE_SYSTEM}/${MODULE_VERSION}/file"
