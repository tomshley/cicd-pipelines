.sbt-publish:
  extends:
    - .tomshley-sbt-runtime
  before_script:
    - !reference [.tomshley-sbt-runtime, before_script]
    - !reference [.before-artifact-tags, before_script]
    - |
      echo "=== CI/CD Git Flow ==="
      echo "Pipeline Source : ${CI_PIPELINE_SOURCE}"
      echo "Ref             : ${CI_COMMIT_REF_NAME}"
      echo "MR Source Branch: ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-N/A}"
      echo "Tag             : ${CI_COMMIT_TAG:-N/A}"
      echo "Flow Type       : ${TOMSHLEY_CICD_FLOW_TYPE}"
    # Override TOMSHLEY_CICD_BUILD_REVISION with unified pinnable tag (ref-slug format).
    # For tags: CICD_PUBLISH_PINNABLE_TAG is empty → revision stays empty → clean version.
    # For branches: CICD_PUBLISH_PINNABLE_TAG is {ref-slug}-{sha} → e.g. develop-abc1234.
    # Plugin composes: magicRootBaseVersion + "-" + TOMSHLEY_CICD_BUILD_REVISION
    - |
      if [ -n "$CICD_PUBLISH_PINNABLE_TAG" ]; then
        export TOMSHLEY_CICD_BUILD_REVISION="$CICD_PUBLISH_PINNABLE_TAG"
      fi
      echo "Build Revision  : ${TOMSHLEY_CICD_BUILD_REVISION}"
  script:
    # Pinnable publish: e.g. 0.2.1-develop-abc1234 (branch) or 0.2.1 (tag)
    - sbt publish
    - |
      if [ "$CICD_PUBLISH_ROLLING" = "true" ]; then
        # Rolling publish: e.g. 0.2.1-develop (just ref-slug, no -latest for JVM)
        export TOMSHLEY_CICD_BUILD_REVISION="$CI_COMMIT_REF_SLUG"
        sbt publish
      fi
