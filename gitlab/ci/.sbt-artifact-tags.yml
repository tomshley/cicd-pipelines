# NOTE: .before-sbt-artifact-tags inlines debug+bootstrap commands instead of
# using !reference [.tomshley-cicd-bootstrap, before_script] to prevent nested
# array depth from exceeding GitLab's 10-level limit when consumers add their
# own !reference [.sbt-publish, before_script] directives.

.before-sbt-artifact-tags:
  before_script:
    - |
      echo "=== CI/CD Git Flow ==="
      echo "Pipeline Source : ${CI_PIPELINE_SOURCE}"
      echo "Ref             : ${CI_COMMIT_REF_NAME}"
      echo "MR Source Branch: ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-N/A}"
      echo "Tag             : ${CI_COMMIT_TAG:-N/A}"
      echo "Flow Type       : ${TOMSHLEY_CICD_FLOW_TYPE}"
      echo "Build Revision  : ${TOMSHLEY_CICD_BUILD_REVISION}"
    - export TOMSHLEY_CICD_BUILD_VERSION="$(cat ${CI_PROJECT_DIR}/VERSION 2>/dev/null || echo 'dev')"
    - echo "Build Version: ${TOMSHLEY_CICD_BUILD_VERSION}"
    - |
      set -e

      if [ -n "$CI_COMMIT_TAG" ]; then
        # ------------------------------------------------------------
        # Tag (release) pipeline — clean version, single publish
        # ------------------------------------------------------------
        export SBT_PUBLISH_PINNABLE="true"
        export SBT_PUBLISH_ROLLING="false"
      else
        # ------------------------------------------------------------
        # Branch / MR pipeline — two publishes
        # ------------------------------------------------------------
        export SBT_PUBLISH_PINNABLE="true"
        export SBT_PUBLISH_ROLLING="true"
        export TOMSHLEY_CICD_BUILD_REVISION_ROLLING="${TOMSHLEY_CICD_FLOW_TYPE}"
      fi

      echo "SBT artifact tags resolved:"
      echo "  TOMSHLEY_CICD_BUILD_REVISION         = $TOMSHLEY_CICD_BUILD_REVISION"
      echo "  TOMSHLEY_CICD_BUILD_REVISION_ROLLING = ${TOMSHLEY_CICD_BUILD_REVISION_ROLLING:-N/A}"
      echo "  SBT_PUBLISH_PINNABLE                 = $SBT_PUBLISH_PINNABLE"
      echo "  SBT_PUBLISH_ROLLING                  = $SBT_PUBLISH_ROLLING"

.sbt-publish:
  extends:
    - .before-sbt-artifact-tags
  script:
    # Pinnable publish: e.g. 1.4.1-develop-abc1234
    - sbt publish
    - |
      if [ "$SBT_PUBLISH_ROLLING" = "true" ]; then
        # Rolling publish: e.g. 1.4.1-develop
        export TOMSHLEY_CICD_BUILD_REVISION="$TOMSHLEY_CICD_BUILD_REVISION_ROLLING"
        sbt publish
      fi
