# Single Bitbucket adapter for cicd-pipelines toolbox.
# Copy to consumer repo as bitbucket-pipelines.yml and customize the image tag.
#
# Required repository variables (Settings > Pipelines > Repository variables):
#   CICD_PIPELINES_RUNNER_TAG    — Runner image tag (e.g., 0.5.0)
#   REGISTRY_USER                — Registry username for pulling runner image
#   REGISTRY_TOKEN               — Registry token/password for pulling runner image
#   TOMSHLEY_CICD_GIT_PUSH_USER  — Bitbucket username for git push
#   TOMSHLEY_CICD_GIT_PUSH_TOKEN — App password with repository:write scope
#     Fallback: BITBUCKET_REPO_ACCESS_TOKEN (workspace access token, user becomes x-token-auth)
#
# Optional repository variables:
#   TOMSHLEY_CICD_GIT_USER_EMAIL — Git commit author email
#     Default: ${TOMSHLEY_CICD_GIT_PUSH_USER}@users.noreply.bitbucket.org
#   TOMSHLEY_CICD_FLOW_MESSAGE_PREFIX — Prefix for merge/tag messages
#     Default: "Tomshley CI Pipeline"
#
# See toolbox/VARIABLES.md for all available environment variables.

definitions:
  yaml-anchors:
    # Map Bitbucket variables to toolbox interface (defined once, referenced per step)
    - &toolbox-setup |
        # Bitbucket token fallback chain: TOMSHLEY_CICD_GIT_PUSH_TOKEN → BITBUCKET_REPO_ACCESS_TOKEN
        if [ -z "${TOMSHLEY_CICD_GIT_PUSH_TOKEN:-}" ]; then
          if [ -n "${BITBUCKET_REPO_ACCESS_TOKEN:-}" ]; then
            export TOMSHLEY_CICD_GIT_PUSH_TOKEN="${BITBUCKET_REPO_ACCESS_TOKEN}"
            export TOMSHLEY_CICD_GIT_PUSH_USER="x-token-auth"
          else
            echo "ERROR: TOMSHLEY_CICD_GIT_PUSH_TOKEN is not set." >&2
            echo "       Set it as a repository variable, or enable a workspace access token" >&2
            echo "       (BITBUCKET_REPO_ACCESS_TOKEN) with repository:write scope." >&2
            exit 1
          fi
        fi
        if [ -z "${TOMSHLEY_CICD_GIT_PUSH_USER:-}" ]; then
          echo "ERROR: TOMSHLEY_CICD_GIT_PUSH_USER is not set." >&2
          echo "       Set it as a repository variable (your Bitbucket username)." >&2
          exit 1
        fi
        export TOMSHLEY_CICD_PROJECT_DIR="${BITBUCKET_CLONE_DIR}"
        export TOMSHLEY_CICD_PROJECT_URL="https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}"
        export TOMSHLEY_CICD_CURRENT_BRANCH="${BITBUCKET_BRANCH:-}"
        export TOMSHLEY_CICD_TAG="${BITBUCKET_TAG:-}"
        export TOMSHLEY_CICD_GIT_USER_EMAIL="${TOMSHLEY_CICD_GIT_USER_EMAIL:-${TOMSHLEY_CICD_GIT_PUSH_USER}@users.noreply.bitbucket.org}"
        export TOMSHLEY_CICD_GIT_USER_NAME="${TOMSHLEY_CICD_GIT_PUSH_USER}"
        source /opt/tomshley-cicd-pipelines-toolbox/platform/toolbox-entry.sh
    - &toolbox-teardown |
        rm -f "$(cat /tmp/.toolbox_askpass_path 2>/dev/null)" /tmp/.toolbox_askpass_path 2>/dev/null || true

image:
  name: registry.gitlab.com/tomshley/brands/global/tware/tech/products/provisioning/cicd-pipelines/cicd-runner-sbtdockertofu:${CICD_PIPELINES_RUNNER_TAG}
  username: $REGISTRY_USER
  password: $REGISTRY_TOKEN

clone:
  depth: full

pipelines:
  custom:
    release-start:
      - step:
          name: "Release Start"
          script:
            - *toolbox-setup
            - /opt/tomshley-cicd-pipelines-toolbox/flow/release-start.sh
          after-script:
            - *toolbox-teardown
    release-continue:
      - step:
          name: "Release Continue"
          script:
            - *toolbox-setup
            - /opt/tomshley-cicd-pipelines-toolbox/flow/release-continue.sh
          after-script:
            - *toolbox-teardown
    release-cancel-new:
      - step:
          name: "Release Cancel and New"
          script:
            - *toolbox-setup
            - /opt/tomshley-cicd-pipelines-toolbox/flow/release-cancel-new.sh
          after-script:
            - *toolbox-teardown
    release-start-skip:
      - step:
          name: "Release Start Skip"
          script:
            - *toolbox-setup
            - /opt/tomshley-cicd-pipelines-toolbox/flow/release-start-skip.sh
          after-script:
            - *toolbox-teardown
    release-finish:
      - step:
          name: "Release Finish"
          script:
            - *toolbox-setup
            - /opt/tomshley-cicd-pipelines-toolbox/flow/release-finish.sh
          after-script:
            - *toolbox-teardown
    # Extension point: release-publish
    # All Bitbucket custom pipelines are manual by default, matching GitLab's when: manual.
    # This is a no-op extension point — consumers override the script block to add
    # release-candidate artifact publishing or other pre-finish steps.
    # NOTE: When overriding, consumers must supply their own image and any
    # required variables (e.g. BASE_CONTAINERS_REGISTRY, BASE_CONTAINERS_UPSTREAM_TAG).
    release-publish:
      - step:
          name: "Release Publish"
          script:
            - |
              echo "Release publish: no default action (override in consumer)"
              echo "Branch: ${BITBUCKET_BRANCH:-}"
    # Extension point: hotfix-publish
    # This is a no-op extension point — consumers override the script block to add
    # hotfix artifact publishing or other pre-finish steps.
    # NOTE: When overriding, consumers must supply their own image and any
    # required variables (e.g. BASE_CONTAINERS_REGISTRY, BASE_CONTAINERS_UPSTREAM_TAG).
    hotfix-publish:
      - step:
          name: "Hotfix Publish"
          script:
            - |
              echo "Hotfix publish: no default action (override in consumer)"
              echo "Branch: ${BITBUCKET_BRANCH:-}"
    hotfix-finish:
      - step:
          name: "Hotfix Finish"
          script:
            - *toolbox-setup
            - /opt/tomshley-cicd-pipelines-toolbox/flow/hotfix-finish.sh
          after-script:
            - *toolbox-teardown
    mirror-sync:
      - step:
          name: "Mirror Sync"
          script:
            - *toolbox-setup
            - /opt/tomshley-cicd-pipelines-toolbox/mirror/sync.sh
          after-script:
            - *toolbox-teardown
