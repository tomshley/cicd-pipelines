# Per-platform maturity status.
# Conformance behavior:
#   active:         failures = errors (CI fails)
#   in-development: failures = warnings (CI passes, prints gaps)
#   roadmap:        skipped entirely

platforms:
  gitlab:
    status: active
  bitbucket:
    status: in-development
  github:
    status: roadmap
  jenkins:
    status: roadmap
