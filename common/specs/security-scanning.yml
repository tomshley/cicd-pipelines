# Required security scanning categories.
# Every platform must provide implementations for these.

pre_build:
  - name: sast
    stage: "security.pre-build"
  - name: secret_detection
    stage: "security.pre-build"
  - name: dependency_scanning
    stage: "security.pre-build"
  - name: license_scanning
    stage: "security.pre-build"

post_build:
  - name: container_scanning
    stage: "security.post-build"
    note: "Opt-in; requires a built container image"
