# Required flow lifecycle jobs.
# Each platform must provide implementations for these.

flow_jobs:
  - name: flow-feature-start
    stage: ".pre"
    trigger: "feature/* branch"
    purpose: "Auto-create merge request for feature branch"
  - name: flow-release-start
    stage: ".post"
    trigger: "develop branch (manual)"
    purpose: "Create release/* branch, bump VERSION"
  - name: flow-release-publish
    stage: "deploy"
    trigger: "release/* branch"
    purpose: "Publish release candidate artifacts"
  - name: flow-release-finish
    stage: ".post"
    trigger: "release/* branch (manual)"
    purpose: "Merge release into main + develop, tag"
  - name: flow-hotfix-finish
    stage: ".post"
    trigger: "hotfix/* branch (manual)"
    purpose: "Merge hotfix into main + develop, tag"
