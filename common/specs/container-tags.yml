# Container image tag resolution rules.
# Maps git refs to container image tags.

tag_resolution:
  tag_pipeline:
    primary: "{CI_COMMIT_TAG}"
    latest: "latest"
  branch_pipeline:
    primary: "{REF_SLUG}-{SHORT_SHA}"
    latest: "{REF_SLUG}-latest"
