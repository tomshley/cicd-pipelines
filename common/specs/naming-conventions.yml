# Naming conventions for cicd-pipelines.
# All platform implementations MUST use these prefixes to avoid collisions
# with CI-platform built-in variables and consumer project variables.

variable_prefix: "TOMSHLEY_CICD_"
gitlab_hidden_job_prefix: ".tomshley-cicd-"
bitbucket_step_prefix: "tomshley-cicd-"
github_action_prefix: "tomshley-cicd-"

required_variables:
  - name: TOMSHLEY_CICD_FLOW_TYPE
    values: [unknown, feature, hotfix, release, develop, main, tag]
    default: unknown
  - name: TOMSHLEY_CICD_BUILD_REVISION
    description: "Git-ref-derived build identifier"
    default: "$CI_COMMIT_SHORT_SHA"
  - name: TOMSHLEY_CICD_BUILD_VERSION
    description: "Semver from VERSION file"
    default: "dev"

required_hidden_jobs:
  gitlab:
    - .tomshley-cicd-debug
    - .tomshley-cicd-bootstrap
  bitbucket: []
