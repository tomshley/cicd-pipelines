# Artifact publish policy rules.
# Defines when artifacts are published based on flow type.

rules:
  - flow_type: develop
    action: auto_publish
    description: "Automatic publish on successful develop builds"
  - flow_type: feature
    action: manual_publish
    description: "Manual publish for feature branches"
  - flow_type: hotfix
    action: manual_publish
    description: "Manual publish for hotfix branches"
  - flow_type: release
    action: manual_publish
    description: "Manual publish for release candidates"
  - flow_type: tag
    action: manual_publish
    description: "Manual publish for production tags"
  - flow_type: unknown
    action: deny
    description: "Never publish for unclassified flows"

merge_request_policy: never
