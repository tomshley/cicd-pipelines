# Unified artifact publish tag resolution rules.
# Applies to ALL artifact types: containers, SBT/JVM packages, TF modules, etc.
# The format pattern is the same across all types — only the consumption differs.

publish_policy:
  tag_pipeline:
    pinnable: true
    rolling: false
  branch_pipeline:
    pinnable: true
    rolling: true

tag_resolution:
  tag_pipeline:
    pinnable_tag: ""
    rolling_tag: "latest"
  branch_pipeline:
    pinnable_tag: "{CI_COMMIT_REF_SLUG}-{CI_COMMIT_SHORT_SHA}"
    rolling_tag: "{CI_COMMIT_REF_SLUG}-latest"

required_variables:
  - CICD_PUBLISH_PINNABLE
  - CICD_PUBLISH_ROLLING
  - CICD_PUBLISH_PINNABLE_TAG
  - CICD_PUBLISH_ROLLING_TAG
