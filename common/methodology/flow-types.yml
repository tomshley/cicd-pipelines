flow_types:
  - name: feature
    branch_pattern: '^feature/.+$'
    revision_prefix: "feature-"
    mr_pipeline: true

  - name: hotfix
    branch_pattern: '^hotfix/.+$'
    revision_prefix: "hotfix-"
    mr_pipeline: true

  - name: release
    branch_pattern: '^release/.+$'
    revision_prefix: "rc-"
    mr_pipeline: true

  - name: develop
    branch_pattern: '^develop$'
    revision_prefix: "dev-"
    mr_pipeline: false

  - name: main
    branch_pattern: '^(main|master)$'
    revision_prefix: "prod-"
    mr_pipeline: false

  - name: tag
    trigger: tag
    revision_source: tag_name
    mr_pipeline: false
